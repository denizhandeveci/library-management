spring.application.name=library-management

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/library_management}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
#spring.jpa.show-sql=true


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

logging.level.com.example.library.management=${APP_LOG_LEVEL:DEBUG}

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}

app.jwt.cookie.name=${JWT_COOKIE_NAME:access_token}
app.jwt.cookie.secure=${JWT_COOKIE_SECURE:false}
app.jwt.cookie.same-site=${JWT_COOKIE_SAME_SITE:Strict}